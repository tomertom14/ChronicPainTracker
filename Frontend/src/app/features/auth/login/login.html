<div class="min-h-screen bg-slate-950 flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center text-emerald-500 mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
      </svg>
    </div>
    <h2 class="text-center text-3xl font-extrabold tracking-tight text-emerald-50">
      Welcome Back
    </h2>
    <p class="mt-2 text-center text-sm text-emerald-200/60">
      Sign in to manage your practice
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-slate-900 py-8 px-4 shadow-2xl sm:rounded-xl sm:px-10 border border-emerald-900/30">
      <form class="space-y-6" (ngSubmit)="onSubmit()">
        
        <div>
          <label for="username" class="block text-sm font-medium text-emerald-100">Username</label>
          <div class="mt-1">
            <input id="username" name="username" type="text" [(ngModel)]="credentials.username" required 
              class="block w-full appearance-none rounded-md border border-slate-700 bg-slate-800 px-3 py-2 text-emerald-50 placeholder-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-emerald-500 sm:text-sm transition-colors duration-200">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-emerald-100">Password</label>
          <div class="mt-1">
            <input id="password" name="password" type="password" [(ngModel)]="credentials.password" required 
              class="block w-full appearance-none rounded-md border border-slate-700 bg-slate-800 px-3 py-2 text-emerald-50 placeholder-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-emerald-500 sm:text-sm transition-colors duration-200">
          </div>
        </div>

        @if (errorMessage) {
          <div class="text-red-400 text-sm text-center bg-red-900/20 py-2 rounded-md border border-red-900/50">
            {{ errorMessage }}
          </div>
        }

        <div>
          <button type="submit" [disabled]="isLoading" 
            class="flex w-full justify-center rounded-md border border-transparent bg-emerald-600 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 focus:ring-offset-slate-900 disabled:opacity-50 transition-all duration-200">
            @if (isLoading) {
              Signing in...
            } @else {
              Sign in
            }
          </button>
        </div>
      </form>

      <div class="mt-6 text-center border-t border-slate-800 pt-6">
        <p class="text-sm text-slate-400">
          New here? 
          <a [routerLink]="['/register']" class="font-medium text-emerald-400 hover:text-emerald-300 transition-colors cursor-pointer">
            Create a new account
          </a>
        </p>
      </div>
      
    </div>
  </div>
</div>
