<div class="min-h-screen bg-gradient-to-br from-emerald-100 via-teal-100 to-stone-100 flex flex-col items-center justify-center font-sans p-6 animate-fade-in relative selection:bg-emerald-300/60">
  
  <div class="w-full max-w-md bg-white rounded-[2.5rem] p-8 md:p-12 shadow-[0_15px_40px_rgb(0,0,0,0.06)] border border-emerald-100 relative overflow-hidden transition-all duration-500 z-10">
    
    <div class="absolute top-0 left-0 -ml-16 -mt-16 w-48 h-48 rounded-full bg-emerald-100/70 blur-3xl -z-10"></div>
    <div class="absolute bottom-0 right-0 -mr-16 -mb-16 w-40 h-40 rounded-full bg-teal-100/70 blur-3xl -z-10"></div>

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-emerald-200 to-teal-100 rounded-3xl text-emerald-700 shadow-md border border-emerald-200 mb-6">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <h2 class="text-3xl md:text-4xl font-extrabold text-emerald-950 tracking-tight mb-2">Welcome Back</h2>
      <p class="text-emerald-900/70 font-medium">Please enter your details to sign in.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5 relative z-10">
      
      @if (errorMessage()) {
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-xl text-red-700 text-sm font-medium shadow-sm">
          {{ errorMessage() }}
        </div>
      }

      <div class="space-y-1.5">
        <label for="username" class="block text-sm font-bold text-emerald-900 ml-1">Username</label>
        <input id="username" type="text" formControlName="username" placeholder="Enter username" 
               class="w-full px-5 py-3.5 bg-white border border-emerald-200 rounded-2xl text-emerald-950 placeholder-emerald-300 focus:outline-none focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all duration-300" />
      </div>

      <div class="space-y-1.5">
        <label for="password" class="block text-sm font-bold text-emerald-900 ml-1">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Enter password" 
               class="w-full px-5 py-3.5 bg-white border border-emerald-200 rounded-2xl text-emerald-950 placeholder-emerald-300 focus:outline-none focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all duration-300" />
      </div>

      <div class="pt-4">
        <button type="submit" [disabled]="loginForm.invalid || isLoading" 
                class="w-full inline-flex items-center justify-center px-8 py-4 text-lg font-bold text-white transition-all duration-300 bg-gradient-to-r from-emerald-500 to-teal-500 rounded-2xl hover:from-emerald-600 hover:to-teal-600 focus:outline-none focus:ring-4 focus:ring-offset-2 focus:ring-emerald-400 shadow-lg shadow-emerald-500/30 hover:shadow-xl hover:-translate-y-0.5 disabled:opacity-60 disabled:cursor-not-allowed">
          @if (isLoading()) {
            Signing in...
          } @else {
            Sign In
          }
        </button>
      </div>

      <p class="text-center text-emerald-900/70 text-sm font-medium mt-6">
        Don't have an account? 
        <a routerLink="/register" class="text-emerald-600 font-bold hover:text-emerald-800 transition-colors hover:underline decoration-2 underline-offset-4">Create one</a>
      </p>
    </form>
  </div>
</div>
