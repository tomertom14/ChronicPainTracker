<div class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 flex flex-col font-sans">
  
  <header class="p-6 flex justify-between items-center w-full max-w-6xl mx-auto">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 shadow-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
      </div>
      <span class="text-xl font-medium text-gray-700 tracking-wide">InnerSpace</span>
    </div>
    
    <button (click)="onLogout()" class="text-sm font-medium text-gray-400 hover:text-gray-700 transition-colors">
      Sign Out
    </button>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center px-6 text-center">
    
    <h1 class="text-4xl md:text-5xl font-light text-gray-800 mb-6">
      Good to see you, <span class="font-medium text-indigo-600">{{ userName }}</span>.
    </h1>
    
    <p class="text-lg text-gray-500 max-w-lg mb-12 leading-relaxed">
      Take a moment for yourself. Track your feelings, process your emotions, and let go of what doesn't serve you today.
    </p>

    <button (click)="onStartPractice()"
            class="group relative inline-flex items-center justify-center px-8 py-4 text-lg font-medium text-white transition-all duration-300 bg-indigo-600 rounded-full hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-600 shadow-lg hover:shadow-indigo-500/30 hover:-translate-y-1">
      
      Start Emotional Check-In
      
      <svg class="w-5 h-5 ml-3 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
      </svg>
    </button>
    
    <p class="mt-6 text-sm text-gray-400">
      Takes about 5 minutes • Based on guided emotional processing
    </p>

  </main>
</div>
