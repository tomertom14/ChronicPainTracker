<div class="min-h-screen bg-gradient-to-br from-emerald-100 via-teal-100 to-stone-100 flex flex-col items-center justify-center font-sans p-6 animate-fade-in relative selection:bg-emerald-300/60">
  
  <div class="absolute top-6 right-6 z-20">
    <button (click)="onLogout()" class="px-5 py-2.5 text-sm font-bold text-emerald-900 bg-white hover:bg-emerald-50 rounded-full transition-all border border-emerald-200/60 shadow-md">
      Logout
    </button>
  </div>

  <div class="max-w-3xl w-full text-center space-y-12 z-10 py-12">
    
    <div class="space-y-4">
      <h1 class="text-5xl md:text-6xl font-extrabold text-emerald-950 tracking-tighter drop-shadow-sm">
        {{ greeting() }}
      </h1>
      <p class="text-xl md:text-2xl text-emerald-900/80 font-medium tracking-wide max-w-xl mx-auto">
        Welcome to your safe space for emotional check-ins.
      </p>
    </div>

    <div class="bg-white rounded-[2.5rem] p-10 md:p-16 shadow-[0_15px_40px_rgb(0,0,0,0.06)] border border-emerald-100 relative overflow-hidden transition-all duration-500 hover:shadow-[0_15px_50px_rgb(16,185,129,0.1)]">
      
      <div class="absolute top-0 right-0 -mr-16 -mt-16 w-56 h-56 rounded-full bg-emerald-100/70 blur-3xl"></div>
      <div class="absolute bottom-0 left-0 -ml-16 -mb-16 w-48 h-48 rounded-full bg-teal-100/70 blur-3xl"></div>
      
      <div class="relative z-10 flex flex-col items-center">
        <div class="w-16 h-16 bg-gradient-to-br from-emerald-200 to-teal-100 rounded-3xl flex items-center justify-center mb-10 text-emerald-700 shadow-md border border-emerald-200">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
          </svg>
        </div>
        
        <p class="text-3xl md:text-4xl text-emerald-950 font-serif leading-tight italic drop-shadow-sm tracking-tight">
          "{{ dailyPrompt() }}"
        </p>
      </div>
    </div>

    <div class="pt-8 relative z-20">
      <button (click)="onStartPractice()" class="group relative inline-flex items-center justify-center px-12 py-5 text-xl font-bold text-white transition-all duration-300 bg-gradient-to-r from-emerald-500 to-teal-500 rounded-2xl hover:from-emerald-600 hover:to-teal-600 focus:outline-none focus:ring-4 focus:ring-offset-2 focus:ring-emerald-400 shadow-xl shadow-emerald-500/30 hover:shadow-2xl hover:shadow-emerald-500/40 hover:-translate-y-1">
        Start Emotional Check-in
        <svg class="w-6 h-6 ml-3.5 -mr-1.5 transition-transform group-hover:translate-x-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
        </svg>
      </button>
    </div>

  </div>
</div>
